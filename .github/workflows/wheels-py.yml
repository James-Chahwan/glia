name: build wheels — repo-graph-py

# Builds abi3 wheels for repo-graph-py (the Rust pyo3 engine) across the
# canonical platform matrix. Triggers on `v*` tag pushes and on manual
# dispatch. Uses maturin's official action.
#
# Publishing: uncomment the `release` job and configure either OIDC trusted
# publishing on PyPI (preferred, no secret needed) or set PYPI_API_TOKEN as
# a repository secret.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}
  pull_request:
    paths:
      - "py/**"
      - "core/**"
      - "code-domain/**"
      - "graph/**"
      - "parsers/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/wheels-py.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: py

jobs:
  linux:
    name: linux ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          working-directory: py
          manylinux: "2_28"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: py/dist

  macos:
    name: macos ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            runner: macos-13
          - target: aarch64
            runner: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          working-directory: py
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: py/dist

  windows:
    name: windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist
          working-directory: py
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: py/dist

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: py
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: py/dist

  # Uncomment + configure when ready to publish. Use PyPI's OIDC trusted
  # publishing (no token needed) by enabling it on the PyPI project page and
  # leaving the `password` field empty. Otherwise set PYPI_API_TOKEN secret
  # and pass it as `password: ${{ secrets.PYPI_API_TOKEN }}`.
