[workspace]
resolver = "3"

# `scratch/latent` is the v0.4.13 latent-injection SWE-bench arm (forked
# qwen2 model + candle `forward_input_embed` hook). Marshmallow-1359 SOLVE
# proven there, then bench inference moved to llama.cpp (~7× faster CPU).
# Excluded from default workspace so default builds skip the candle
# download/compile. Build explicitly when needed:
#   cargo build -p repo-graph-latent
exclude = ["scratch/latent"]

members = [
    "scratch",
    "core",
    "code-domain",
    "parsers/code/python",
    "parsers/code/go",
    "parsers/code/typescript",
    "graph",
    "store",
    "projection-text",
    "activation",
    "parsers/code/rust",
    "parsers/code/java",
    "parsers/code/csharp",
    "parsers/code/ruby",
    "parsers/code/php",
    "parsers/code/swift",
    "parsers/code/c_cpp",
    "parsers/code/scala",
    "parsers/code/clojure",
    "parsers/code/dart",
    "parsers/code/elixir",
    "parsers/code/solidity",
    "parsers/code/terraform",
    "parsers/code/react",
    "parsers/code/angular",
    "parsers/code/vue",
    "parsers/code/extractors",
    "engine",
    "py",
    "cli",
]
